name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # ── Signed Release Build ──────────────────────────────────────────
      # Requires GitHub Secrets:
      #   KEYSTORE_BASE64  - base64-encoded .jks keystore file
      #   KEYSTORE_PASSWORD - keystore password
      #   KEY_ALIAS         - key alias name
      #   KEY_PASSWORD      - key password

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/plotwise-release.jks

      - name: Build signed release APK
        if: env.KEYSTORE_BASE64 != ''
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          PLOTWISE_STORE_FILE: app/plotwise-release.jks
          PLOTWISE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PLOTWISE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          PLOTWISE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build unsigned release APK (fallback)
        if: env.KEYSTORE_BASE64 == ''
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleRelease

      # ── Upload Artifacts ──────────────────────────────────────────────

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: plotwise-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK (signed)
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: plotwise-release-signed
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Upload release APK (unsigned fallback)
        if: env.KEYSTORE_BASE64 == ''
        uses: actions/upload-artifact@v4
        with:
          name: plotwise-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
